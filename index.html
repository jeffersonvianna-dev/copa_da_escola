<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa da Escola — Painel URE</title>
  <style>
    :root {
      --blue:         #005BAC;
      --blue-pale:    #e8f0f9;
      --blue-mid:     #cce0f5;
      --orange:       #F47920;
      --orange-light: #fff3e8;
      --gray:         #f5f6fa;
      --gray-mid:     #dde2ec;
      --text:         #1a1f36;
      --text-muted:   #6b7280;
      --white:        #ffffff;
      --radius:       12px;
      --shadow:       0 2px 12px rgba(0,0,0,.08);
      --shadow-lg:    0 4px 24px rgba(0,0,0,.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gray);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--blue);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-logo { height: 44px; width: auto; }
    .header-title h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--white);
      line-height: 1.1;
    }
    .header-title p {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.7);
      margin-top: 2px;
    }
    .header-stamp { font-size: 12px; color: rgba(255,255,255,.7); white-space: nowrap; }
    .header-stamp strong { color: var(--white); }

    /* ── Layout ── */
    .page { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 24px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    select, input[type="search"] {
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--gray-mid);
      border-radius: 8px;
      background: var(--white);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .18s;
      min-width: 120px;
    }
    select:focus, input[type="search"]:focus { border-color: var(--blue); }
    input[type="search"]::placeholder { color: var(--text-muted); }

    /* Multi-select série */
    .field-multi { position: relative; min-width: 180px; }
    .multi-trigger {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--gray-mid);
      border-radius: 8px;
      background: var(--white);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: border-color .18s;
    }
    .multi-trigger:hover, .multi-trigger:focus { border-color: var(--blue); outline: none; }
    .multi-trigger::after { content: " \25BE"; color: var(--blue); float: right; }
    .multi-panel {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 30;
      min-width: 220px;
      padding: 12px;
      background: var(--white);
      border: 1px solid var(--gray-mid);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      display: none;
    }
    .multi-panel.open { display: block; }
    .multi-actions { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .multi-actions button {
      border: none; background: none;
      color: var(--blue);
      font: inherit; font-size: 12px; font-weight: 700;
      cursor: pointer; padding: 2px 4px;
    }
    .multi-options { display: grid; gap: 3px; max-height: 210px; overflow: auto; }
    .multi-option {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 8px;
      cursor: pointer; font-size: 14px;
      transition: background .18s; user-select: none;
    }
    .multi-option:hover { background: var(--blue-pale); }
    .multi-option input { accent-color: var(--blue); cursor: pointer; }

    /* Clear button */
    .btn-clear {
      height: 40px; width: 40px;
      border: 1px solid var(--gray-mid); border-radius: 8px;
      background: var(--white); color: var(--text-muted);
      font-size: 18px; cursor: pointer; transition: all .18s;
    }
    .btn-clear:hover { border-color: var(--blue); color: var(--blue); }

    /* Search */
    .search-field { min-width: 220px; margin-left: auto; }
    .search-field input { width: 100%; }

    /* ── Summary ── */
    .section-label {
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 12px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      border-left: 3px solid var(--blue);
      transition: box-shadow .18s;
    }
    .card:hover { box-shadow: var(--shadow-lg); }
    .card-label {
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 8px;
    }
    .card-value {
      font-size: 26px; font-weight: 900;
      letter-spacing: -0.03em; color: var(--blue);
    }
    .card-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* ── Table section ── */
    .table-section {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-top {
      padding: 18px 24px;
      border-bottom: 1px solid var(--gray-mid);
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .tabs { display: flex; gap: 6px; }
    .tab-button {
      height: 36px; padding: 0 18px;
      border: 1px solid var(--gray-mid); border-radius: 8px;
      background: transparent; color: var(--text-muted);
      font: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all .18s;
    }
    .tab-button.active { background: var(--blue); border-color: var(--blue); color: var(--white); }
    .tab-button:not(.active):hover { border-color: var(--blue); color: var(--blue); }
    .table-filters { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .field-inline { min-width: 200px; }
    .field-inline select { width: 100%; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; min-width: 860px; border-collapse: collapse; }
    thead th {
      background: var(--blue-pale); color: var(--blue);
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 12px 16px; text-align: left;
      white-space: nowrap; cursor: pointer;
      user-select: none; position: sticky; top: 0;
      transition: background .18s;
    }
    thead th[data-sortable="false"] { cursor: default; }
    thead th:hover:not([data-sortable="false"]) { background: var(--blue-mid); }
    thead th.active-sort { color: var(--orange); }
    tbody td {
      padding: 11px 16px;
      border-top: 1px solid var(--gray-mid);
      white-space: nowrap; font-size: 14px;
    }
    tbody tr:hover { background: var(--blue-pale); transition: background .12s; }
    .td-rank { width: 56px; text-align: center !important; }
    .td-name { font-weight: 600; min-width: 200px; }
    .td-num  { text-align: right !important; }
    thead th.td-num { text-align: right !important; }

    .rank-medal {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      font-weight: 900; font-size: 13px;
    }
    .rank-1 { background: #FFD700; color: #7a5c00; }
    .rank-2 { background: #C0C0C0; color: #4a4a4a; }
    .rank-3 { background: #cd7f32; color: #fff; }
    .rank-n { color: var(--text-muted); font-size: 13px; }

    .score-badge {
      display: inline-block; padding: 4px 10px;
      border-radius: 99px;
      background: var(--blue-pale); color: var(--blue);
      font-weight: 900; font-size: 13px;
    }

    /* Notices */
    .notice { padding: 28px; text-align: center; color: var(--text-muted); font-size: 14px; }
    .notice.error { color: #c0392b; background: #fff5f5; }

    /* Loading */
    .loading-wrap { padding: 40px; text-align: center; color: var(--blue); }
    .spinner {
      display: inline-block; width: 32px; height: 32px;
      border: 3px solid var(--blue-pale); border-top-color: var(--blue);
      border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      padding: 12px 24px;
      border-top: 1px solid var(--gray-mid);
      font-size: 12px; color: var(--text-muted);
    }
    .hidden { display: none !important; }

    /* ── Responsive ── */
    @media (max-width: 1100px) { .cards { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 760px) {
      .page { padding: 16px; }
      .header-stamp { display: none; }
      .cards { grid-template-columns: repeat(2, 1fr); }
      .search-field { margin-left: 0; min-width: 100%; }
    }
    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .btn-clear { width: 100%; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <img src="./assets/logo-copa-da-escola.png" alt="Copa da Escola" class="header-logo">
      <div class="header-title">
        <h1>Copa da Escola</h1>
        <p>Painel para URE</p>
      </div>
    </div>
    <div class="header-stamp">Atualizado em <strong id="today-date"></strong></div>
  </header>

  <main class="page">

    <!-- Filtros globais -->
    <div class="filter-bar">
      <div class="field">
        <label for="filter-fase">Fase</label>
        <select id="filter-fase"></select>
      </div>
      <div class="field">
        <label for="filter-rodada">Rodada</label>
        <select id="filter-rodada"></select>
      </div>
      <div class="field field-multi">
        <label>Serie</label>
        <button class="multi-trigger" id="filter-serie-trigger" type="button">Todos</button>
        <div class="multi-panel" id="filter-serie-panel">
          <div class="multi-actions">
            <button id="select-all-series" type="button">Marcar todas</button>
            <button id="clear-series" type="button">Limpar</button>
          </div>
          <div class="multi-options" id="filter-serie-options"></div>
        </div>
      </div>
      <button class="btn-clear" id="clear-filters" title="Limpar filtros" aria-label="Limpar filtros">&#8635;</button>
      <div class="field search-field">
        <label for="search-regional" id="search-label">Regional</label>
        <input id="search-regional" type="search" placeholder="Buscar regional...">
      </div>
    </div>

    <!-- Cards de resumo -->
    <p class="section-label" id="summary-title">SEDUC</p>
    <div class="cards" id="summary-cards">
      <div class="card" style="grid-column:1/-1">
        <div class="loading-wrap"><div class="spinner"></div><br>Carregando...</div>
      </div>
    </div>

    <!-- Tabela com abas -->
    <div class="table-section">
      <div class="table-top">
        <div class="tabs" role="tablist" aria-label="Visao do ranking">
          <button class="tab-button active" id="tab-seduc"  type="button">SEDUC</button>
          <button class="tab-button"        id="tab-ure"    type="button">URE</button>
          <button class="tab-button"        id="tab-escola" type="button">Escola</button>
        </div>
        <div class="table-filters">
          <div class="field field-inline hidden" id="ure-regional-field">
            <label for="filter-ure-regional">Regional</label>
            <select id="filter-ure-regional"></select>
          </div>
          <div class="field field-inline hidden" id="escola-field">
            <label for="filter-escola">Escola</label>
            <select id="filter-escola"></select>
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr id="table-head"></tr></thead>
          <tbody id="table-body">
            <tr><td colspan="8">
              <div class="loading-wrap">
                <div class="spinner"></div><br>Conectando ao Supabase...
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
      <div class="footer-note" id="footer-note"></div>
    </div>

  </main>

  <script>
    /* ================================================================
       Configuracao Supabase
    ================================================================ */
    const SUPABASE_URL = 'https://uhbsnrnnnhntkibtsyre.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoYnNucm5ubmhudGtpYnRzeXJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzg5OTIsImV4cCI6MjA4OTg1NDk5Mn0.-KYdeGfl--TC_8yYyWOOURqJinHTtVt-z8HKMt6jYHg';
    const SCHEMA   = '2026_copa_da_escola';
    const TABLE    = 'resultados_turmas';
    const PAGE_SIZE = 1000;
    const DEFAULT_FILTERS = { fase: '1', rodada: '1' };

    /* ================================================================
       Colunas das tabelas
    ================================================================ */
    const seducColumns = [
      { key: 'rank',         label: '#',          sortable: false, cls: 'td-rank' },
      { key: 'regional',     label: 'Regional',   sortable: true,  cls: 'td-name' },
      { key: 'totalEscolas', label: 'Escolas',    sortable: true,  cls: 'td-num'  },
      { key: 'totalTurmas',  label: 'Turmas',     sortable: true,  cls: 'td-num'  },
      { key: 'pontuacao',    label: 'Pontuacao',  sortable: true,  cls: 'td-num'  },
      { key: 'frequencia',   label: 'Frequencia', sortable: true,  cls: 'td-num'  },
      { key: 'tarefas',      label: 'Tarefas',    sortable: true,  cls: 'td-num'  },
      { key: 'acertos',      label: 'Acertos',    sortable: true,  cls: 'td-num'  },
    ];
    const ureColumns = [
      { key: 'rank',        label: '#',          sortable: false, cls: 'td-rank' },
      { key: 'escola',      label: 'Escola',     sortable: true,  cls: 'td-name' },
      { key: 'totalTurmas', label: 'Turmas',     sortable: true,  cls: 'td-num'  },
      { key: 'pontuacao',   label: 'Pontuacao',  sortable: true,  cls: 'td-num'  },
      { key: 'frequencia',  label: 'Frequencia', sortable: true,  cls: 'td-num'  },
      { key: 'tarefas',     label: 'Tarefas',    sortable: true,  cls: 'td-num'  },
      { key: 'acertos',     label: 'Acertos',    sortable: true,  cls: 'td-num'  },
    ];
    const escolaColumns = [
      { key: 'rank',       label: '#',          sortable: false, cls: 'td-rank' },
      { key: 'turma',      label: 'Turma',      sortable: true,  cls: 'td-name' },
      { key: 'pontuacao',  label: 'Pontuacao',  sortable: true,  cls: 'td-num'  },
      { key: 'frequencia', label: 'Frequencia', sortable: true,  cls: 'td-num'  },
      { key: 'tarefas',    label: 'Tarefas',    sortable: true,  cls: 'td-num'  },
      { key: 'acertos',    label: 'Acertos',    sortable: true,  cls: 'td-num'  },
    ];

    /* ================================================================
       Estado global
    ================================================================ */
    const state = {
      rawRows:       [],
      groupedRows:   [],
      seriesOptions: [],
      activeView:    'seduc',
      sort: { key: 'pontuacao', direction: 'desc' },
    };

    /* ================================================================
       DOM refs
    ================================================================ */
    const $         = id => document.getElementById(id);
    const summaryCards  = $('summary-cards');
    const summaryTitle  = $('summary-title');
    const tableHead     = $('table-head');
    const tableBody     = $('table-body');
    const footerNote    = $('footer-note');
    const searchInput   = $('search-regional');
    const searchLabel   = $('search-label');
    const tabSeduc      = $('tab-seduc');
    const tabUre        = $('tab-ure');
    const tabEscola     = $('tab-escola');
    const ureField      = $('ure-regional-field');
    const escolaFieldEl = $('escola-field');
    const filterUre     = $('filter-ure-regional');
    const filterEscola  = $('filter-escola');
    const filterFase    = $('filter-fase');
    const filterRodada  = $('filter-rodada');
    const serieTrigger  = $('filter-serie-trigger');
    const seriePanel    = $('filter-serie-panel');
    const serieOptions  = $('filter-serie-options');

    $('today-date').textContent = new Intl.DateTimeFormat('pt-BR').format(new Date());

    /* ================================================================
       Supabase — fetch paginado
    ================================================================ */
    async function fetchPage(fase, rodada, offset, withCount) {
      const url = SUPABASE_URL + '/rest/v1/' + TABLE
        + '?fase=eq.' + fase
        + '&rodada=eq.' + rodada
        + '&select=*&limit=' + PAGE_SIZE
        + '&offset=' + offset;
      const headers = {
        'apikey':         SUPABASE_KEY,
        'Authorization':  'Bearer ' + SUPABASE_KEY,
        'Accept-Profile': SCHEMA,
      };
      if (withCount) headers['Prefer'] = 'count=exact';
      const resp = await fetch(url, { headers });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const total = withCount
        ? parseInt((resp.headers.get('Content-Range') || '').split('/')[1] || '0', 10)
        : 0;
      return { data: await resp.json(), total };
    }

    async function fetchAllRows(fase, rodada) {
      const { data: first, total } = await fetchPage(fase, rodada, 0, true);
      if (!total || total <= PAGE_SIZE) return first;
      const offsets = [];
      for (let o = PAGE_SIZE; o < total; o += PAGE_SIZE) offsets.push(o);
      // Busca em lotes de 10 paralelas para nao sobrecarregar
      const BATCH = 10;
      const all = [...first];
      for (let i = 0; i < offsets.length; i += BATCH) {
        const batch = offsets.slice(i, i + BATCH);
        const pages = await Promise.all(
          batch.map(function(o) { return fetchPage(fase, rodada, o, false).then(function(r) { return r.data; }); })
        );
        pages.forEach(function(p) { all.push.apply(all, p); });
      }
      return all;
    }

    /* ================================================================
       Helpers de calculo
    ================================================================ */
    function toNum(v) {
      const n = Number(String(v).replace(',', '.'));
      return Number.isFinite(n) ? n : 0;
    }
    function fmtInt(v)   { return new Intl.NumberFormat('pt-BR').format(v); }
    function fmtScore(v) {
      return Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function avg(rows, field) {
      if (!rows.length) return 0;
      return rows.reduce(function(s, r) { return s + toNum(r[field]); }, 0) / rows.length;
    }
    function uniqueCount(rows, field) {
      return new Set(rows.map(function(r) { return r[field]; }).filter(Boolean)).size;
    }

    /* ================================================================
       Serie
    ================================================================ */
    const SERIE_LABELS = {
      '6': '6o ano', '7': '7o ano', '8': '8o ano', '9': '9o ano',
      '1': '1a serie', '2': '2a serie', '3': '3a serie',
    };
    function serieLabel(v) { return SERIE_LABELS[String(v)] || String(v); }
    function orderedSeries(rows) {
      const order = ['6','7','8','9','1','2','3'];
      const avail = new Set(rows.map(function(r) { return String(r.nr_serie); }).filter(Boolean));
      return order.filter(function(v) { return avail.has(v); });
    }
    function selectedSeries() {
      return Array.from(serieOptions.querySelectorAll('input:checked')).map(function(i) { return i.value; });
    }
    function updateSerieTrigger() {
      const sel = selectedSeries();
      serieTrigger.textContent = (!sel.length || sel.length === state.seriesOptions.length)
        ? 'Todos'
        : sel.map(serieLabel).join(', ');
    }

    /* ================================================================
       Filtros
    ================================================================ */
    function uniqueVals(rows, field, sortNum) {
      const vals = Array.from(new Set(rows.map(function(r) { return r[field]; }).filter(function(v) { return v !== null && v !== undefined; })));
      return sortNum
        ? vals.sort(function(a, b) { return Number(a) - Number(b); })
        : vals.sort(function(a, b) { return String(a).localeCompare(String(b), 'pt-BR'); });
    }
    function fillSelect(sel, values, defVal) {
      sel.innerHTML = values.map(function(v) { return '<option value="' + v + '">' + v + '</option>'; }).join('');
      if (defVal !== undefined) sel.value = String(defVal);
      if (!sel.value && sel.options.length) sel.value = sel.options[0].value;
    }

    function buildFilters(rows, currentFase, currentRodada) {
      fillSelect(filterFase,   uniqueVals(rows, 'fase',   true), currentFase);
      fillSelect(filterRodada, uniqueVals(rows, 'rodada', true), currentRodada);
      fillSelect(filterUre, uniqueVals(rows, 'nm_diretoria', false), '');
      fillSchoolSelect(rows, filterUre.value);
      state.seriesOptions = orderedSeries(rows);
      serieOptions.innerHTML = state.seriesOptions.map(function(v) {
        return '<label class="multi-option"><input type="checkbox" value="' + v + '"><span>' + serieLabel(v) + '</span></label>';
      }).join('');
      serieOptions.querySelectorAll('input').forEach(function(inp) {
        inp.addEventListener('change', function() { updateSerieTrigger(); renderDashboard(); });
      });
      updateSerieTrigger();
    }

    function fillSchoolSelect(rows, regional) {
      const map = new Map();
      rows.filter(function(r) { return (r.nm_diretoria || '').trim() === regional; })
        .forEach(function(r) { map.set(r.cd_escola, (r.nm_escola || '').trim()); });
      const schools = Array.from(map.values()).filter(Boolean)
        .sort(function(a, b) { return a.localeCompare(b, 'pt-BR'); });
      fillSelect(filterEscola, schools, '');
    }

    function getFilteredRows() {
      const sel = selectedSeries();
      return state.rawRows.filter(function(r) {
        return String(r.fase)   === filterFase.value &&
               String(r.rodada) === filterRodada.value &&
               (!sel.length || sel.includes(String(r.nr_serie)));
      });
    }

    /* ================================================================
       Agrupamentos
    ================================================================ */
    function groupByRegional(rows) {
      const map = {};
      rows.forEach(function(r) {
        const key = (r.nm_diretoria || 'Nao informado').trim();
        if (!map[key]) map[key] = { regional: key, rows: [] };
        map[key].rows.push(r);
      });
      return Object.values(map).map(function(g) {
        return {
          regional:     g.regional,
          totalEscolas: uniqueCount(g.rows, 'cd_escola'),
          totalTurmas:  uniqueCount(g.rows, 'cd_turma'),
          pontuacao:    avg(g.rows, 'pontos_total'),
          frequencia:   avg(g.rows, 'pontos_frequencia'),
          tarefas:      avg(g.rows, 'pontos_tarefas'),
          acertos:      avg(g.rows, 'pontos_acertos'),
        };
      });
    }

    function groupBySchool(rows, regional) {
      const scoped = rows.filter(function(r) { return (r.nm_diretoria || '').trim() === regional; });
      const map = {};
      scoped.forEach(function(r) {
        const key = r.cd_escola + '|' + (r.nm_escola || '').trim();
        if (!map[key]) map[key] = { escola: (r.nm_escola || 'Nao informado').trim(), rows: [] };
        map[key].rows.push(r);
      });
      return Object.values(map).map(function(g) {
        return {
          escola:      g.escola,
          totalTurmas: uniqueCount(g.rows, 'cd_turma'),
          pontuacao:   avg(g.rows, 'pontos_total'),
          frequencia:  avg(g.rows, 'pontos_frequencia'),
          tarefas:     avg(g.rows, 'pontos_tarefas'),
          acertos:     avg(g.rows, 'pontos_acertos'),
        };
      });
    }

    function groupByClass(rows, regional, escola) {
      return rows
        .filter(function(r) {
          return (r.nm_diretoria || '').trim() === regional &&
                 (r.nm_escola    || '').trim() === escola;
        })
        .map(function(r) {
          return {
            turma:      r.ds_turma || 'Nao informado',
            pontuacao:  toNum(r.pontos_total),
            frequencia: toNum(r.pontos_frequencia),
            tarefas:    toNum(r.pontos_tarefas),
            acertos:    toNum(r.pontos_acertos),
          };
        });
    }

    /* ================================================================
       Cards de resumo
    ================================================================ */
    function buildSummary(rows) {
      const cards = [
        { label: 'Total de escolas', value: fmtInt(uniqueCount(rows, 'cd_escola')),       meta: 'Escolas unicas' },
        { label: 'Total de turmas',  value: fmtInt(uniqueCount(rows, 'cd_turma')),         meta: 'Turmas unicas' },
        { label: 'Pontuacao',        value: fmtScore(avg(rows, 'pontos_total')),           meta: 'Media pontos totais' },
        { label: 'Frequencia',       value: fmtScore(avg(rows, 'pontos_frequencia')),      meta: 'Media pontos frequencia' },
        { label: 'Tarefas',          value: fmtScore(avg(rows, 'pontos_tarefas')),         meta: 'Media pontos tarefas' },
        { label: 'Acertos',          value: fmtScore(avg(rows, 'pontos_acertos')),         meta: 'Media pontos acertos' },
      ];
      summaryCards.innerHTML = cards.map(function(c) {
        return '<div class="card"><div class="card-label">' + c.label + '</div>'
          + '<div class="card-value">' + c.value + '</div>'
          + '<div class="card-meta">' + c.meta + '</div></div>';
      }).join('');
    }

    /* ================================================================
       Tabela — renderizacao
    ================================================================ */
    function currentColumns() {
      if (state.activeView === 'ure')    return ureColumns;
      if (state.activeView === 'escola') return escolaColumns;
      return seducColumns;
    }

    function compareVals(a, b, dir) {
      if (typeof a === 'string') return dir === 'asc' ? a.localeCompare(b, 'pt-BR') : b.localeCompare(a, 'pt-BR');
      return dir === 'asc' ? a - b : b - a;
    }

    function visibleRows() {
      const term    = searchInput.value.trim().toLocaleLowerCase('pt-BR');
      const nameKey = state.activeView === 'ure' ? 'escola' : state.activeView === 'escola' ? 'turma' : 'regional';
      let rows      = term
        ? state.groupedRows.filter(function(r) { return String(r[nameKey] || '').toLocaleLowerCase('pt-BR').includes(term); })
        : state.groupedRows.slice();
      const key = state.sort.key;
      const dir = state.sort.direction;
      if (key !== 'rank') rows.sort(function(a, b) { return compareVals(a[key], b[key], dir); });
      return rows;
    }

    function rankBadge(i) {
      if (i === 0) return '<span class="rank-medal rank-1">1</span>';
      if (i === 1) return '<span class="rank-medal rank-2">2</span>';
      if (i === 2) return '<span class="rank-medal rank-3">3</span>';
      return '<span class="rank-n">' + (i + 1) + '</span>';
    }

    function renderHead() {
      const cols = currentColumns();
      tableHead.innerHTML = cols.map(function(c) {
        const active   = state.sort.key === c.key ? 'active-sort' : '';
        const sortable = c.sortable ? 'true' : 'false';
        const arrow    = c.sortable
          ? (state.sort.key === c.key ? (state.sort.direction === 'asc' ? ' ^' : ' v') : ' *')
          : '';
        return '<th class="' + c.cls + ' ' + active + '" data-key="' + c.key + '" data-sortable="' + sortable + '">' + c.label + arrow + '</th>';
      }).join('');
      tableHead.querySelectorAll('th[data-sortable="true"]').forEach(function(th) {
        th.addEventListener('click', function() {
          const key = th.dataset.key;
          const dir = state.sort.key === key && state.sort.direction === 'desc' ? 'asc' : 'desc';
          state.sort = { key: key, direction: dir };
          renderHead(); renderBody();
        });
      });
    }

    function renderBody() {
      const cols = currentColumns();
      const rows = visibleRows();
      if (!rows.length) {
        tableBody.innerHTML = '<tr><td colspan="' + cols.length + '"><div class="notice">Nenhum resultado para os filtros aplicados.</div></td></tr>';
        footerNote.textContent = '';
        return;
      }
      tableBody.innerHTML = rows.map(function(row, i) {
        return '<tr>'
          + '<td class="td-rank">' + rankBadge(i) + '</td>'
          + '<td class="td-name">' + (row.regional || row.escola || row.turma) + '</td>'
          + (state.activeView === 'seduc'  ? '<td class="td-num">' + fmtInt(row.totalEscolas) + '</td>' : '')
          + (state.activeView !== 'escola' ? '<td class="td-num">' + fmtInt(row.totalTurmas)  + '</td>' : '')
          + '<td class="td-num"><span class="score-badge">' + fmtScore(row.pontuacao)  + '</span></td>'
          + '<td class="td-num">' + fmtScore(row.frequencia) + '</td>'
          + '<td class="td-num">' + fmtScore(row.tarefas)   + '</td>'
          + '<td class="td-num">' + fmtScore(row.acertos)   + '</td>'
          + '</tr>';
      }).join('');
      const entity  = state.activeView === 'escola' ? 'turma(s)' : state.activeView === 'ure' ? 'escola(s)' : 'regional(is)';
      const sortCol = cols.find(function(c) { return c.key === state.sort.key; });
      footerNote.textContent = fmtInt(rows.length) + ' ' + entity + ' exibida(s), ordenadas por ' + (sortCol ? sortCol.label.toLowerCase() : 'pontuacao') + '.';
    }

    /* ================================================================
       Dashboard — render principal
    ================================================================ */
    function renderDashboard() {
      const filtered = getFilteredRows();
      const summaryRows =
        state.activeView === 'escola'
          ? filtered.filter(function(r) { return (r.nm_diretoria || '').trim() === filterUre.value && (r.nm_escola || '').trim() === filterEscola.value; })
          : state.activeView === 'ure'
            ? filtered.filter(function(r) { return (r.nm_diretoria || '').trim() === filterUre.value; })
            : filtered;

      buildSummary(summaryRows);

      state.groupedRows =
        state.activeView === 'ure'
          ? groupBySchool(filtered, filterUre.value)
          : state.activeView === 'escola'
            ? groupByClass(filtered, filterUre.value, filterEscola.value)
            : groupByRegional(filtered);

      summaryTitle.textContent =
        state.activeView === 'escola' && filterEscola.value ? 'Escola - ' + filterEscola.value :
        state.activeView === 'ure'    && filterUre.value    ? 'Regional - ' + filterUre.value :
        'SEDUC';

      renderHead();
      renderBody();
    }

    /* ================================================================
       Carregamento de dados do Supabase
    ================================================================ */
    async function loadDashboard() {
      const fase   = filterFase.value   || DEFAULT_FILTERS.fase;
      const rodada = filterRodada.value || DEFAULT_FILTERS.rodada;

      tableBody.innerHTML    = '<tr><td colspan="8"><div class="loading-wrap"><div class="spinner"></div><br>Carregando dados...</div></td></tr>';
      summaryCards.innerHTML = '<div class="card" style="grid-column:1/-1"><div class="loading-wrap"><div class="spinner"></div></div></div>';

      try {
        state.rawRows = await fetchAllRows(fase, rodada);
        buildFilters(state.rawRows, fase, rodada);
        state.sort = { key: 'pontuacao', direction: 'desc' };
        searchInput.value = '';
        renderDashboard();
        footerNote.textContent = fmtInt(state.rawRows.length) + ' turmas carregadas — Fase ' + fase + ', Rodada ' + rodada + '. Fonte: Supabase.';
      } catch (err) {
        tableBody.innerHTML    = '<tr><td colspan="8"><div class="notice error">Erro ao carregar dados: ' + err.message + '</div></td></tr>';
        summaryCards.innerHTML = '<div class="notice error" style="grid-column:1/-1">Erro ao conectar com o Supabase.</div>';
        footerNote.textContent = '';
      }
    }

    /* ================================================================
       Eventos
    ================================================================ */
    [filterFase, filterRodada].forEach(function(sel) {
      sel.addEventListener('change', loadDashboard);
    });

    $('clear-filters').addEventListener('click', function() {
      serieOptions.querySelectorAll('input').forEach(function(i) { i.checked = false; });
      updateSerieTrigger();
      seriePanel.classList.remove('open');
      searchInput.value  = '';
      state.sort         = { key: 'pontuacao', direction: 'desc' };
      filterFase.value   = DEFAULT_FILTERS.fase;
      filterRodada.value = DEFAULT_FILTERS.rodada;
      loadDashboard();
    });

    serieTrigger.addEventListener('click', function() { seriePanel.classList.toggle('open'); });
    $('select-all-series').addEventListener('click', function() {
      serieOptions.querySelectorAll('input').forEach(function(i) { i.checked = true; });
      updateSerieTrigger(); renderDashboard();
    });
    $('clear-series').addEventListener('click', function() {
      serieOptions.querySelectorAll('input').forEach(function(i) { i.checked = false; });
      updateSerieTrigger(); renderDashboard();
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.field-multi')) seriePanel.classList.remove('open');
    });

    function setTab(view) {
      state.activeView = view;
      state.sort = { key: 'pontuacao', direction: 'desc' };
      [tabSeduc, tabUre, tabEscola].forEach(function(t) { t.classList.remove('active'); });
      $('tab-' + view).classList.add('active');
      const needUre = view === 'ure' || view === 'escola';
      ureField.classList.toggle('hidden', !needUre);
      escolaFieldEl.classList.toggle('hidden', view !== 'escola');
      if (needUre && !filterUre.value && filterUre.options.length) filterUre.value = filterUre.options[0].value;
      if (view === 'escola') fillSchoolSelect(getFilteredRows(), filterUre.value);
      const labels = {
        seduc:  ['Regional', 'Buscar regional...'],
        ure:    ['Escola',   'Buscar escola...'],
        escola: ['Turma',    'Buscar turma...'],
      };
      searchLabel.textContent = labels[view][0];
      searchInput.placeholder = labels[view][1];
      searchInput.value       = '';
      renderDashboard();
    }
    tabSeduc.addEventListener ('click', function() { setTab('seduc');  });
    tabUre.addEventListener   ('click', function() { setTab('ure');    });
    tabEscola.addEventListener('click', function() { setTab('escola'); });

    searchInput.addEventListener('input', renderBody);
    filterUre.addEventListener('change', function() {
      fillSchoolSelect(getFilteredRows(), filterUre.value);
      renderDashboard();
    });
    filterEscola.addEventListener('change', renderDashboard);

    /* ================================================================
       Init
    ================================================================ */
    renderHead();
    loadDashboard();
  </script>
</body>
</html>
